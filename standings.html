    </div>
  </section>

  <!-- ========== STANDINGS ========== -->
  <section class="section standings-section" id="standings">
    <div class="container">
      <div class="standings-tabs fade-in" id="standingsTabs">
        <button class="standings-tab active" data-group="whisky">&#129347; Whisky</button>
        <button class="standings-tab" data-group="champagne">&#127870; Champagne</button>
        <button class="standings-tab" data-group="coronita">&#127819; Coronita</button>
        <button class="standings-tab" data-group="helles">&#127866; Helles</button>
        <button class="standings-tab" data-group="weizen">&#127806; Weizen</button>
      </div>
      <div class="standings-table-wrapper fade-in" id="standingsContent">
        <div class="standings-loading" id="standingsLoading">
          <div class="standings-skeleton">
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
          </div>
        </div>
        <div class="standings-empty" id="standingsEmpty" style="display:none;">
          <p>&#127870; Season 2 starts April 13th &mdash; standings will appear here</p>
        </div>
        <table class="standings-table" id="standingsTable" style="display:none;">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>MP</th>
              <th>W</th>
              <th>L</th>
              <th>Pts</th>
              <th>Rating</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </div>
